{% extends "base.html" %}

{% block title %}Profile — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Your Profile</h1>
            <p class="auth-subtitle">Manage your account</p>
        </div>

        <div class="auth-card">
            <p>Name: <strong>{{ current_user.name }}</strong></p>
            <p>Email: <strong>{{ current_user.email }}</strong></p>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('logout') }}">Sign out</a>
        </p>

    </div>
</section>

{% endblock %}
